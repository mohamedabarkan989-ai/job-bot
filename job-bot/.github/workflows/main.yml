name: Morocco Jobs Bot

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: full | fetch | send | stats | trends"
        default: "full"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          TG_TOKEN:      ${{ secrets.TG_TOKEN }}
          TG_CHAT:       ${{ secrets.TG_CHAT }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          MAX_SEND:      "50"
        run: python main.py ${{ github.event.inputs.mode || 'full' }}
