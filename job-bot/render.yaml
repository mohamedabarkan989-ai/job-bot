# render.yaml — ضعه في جذر المستودع
services:
  - type: web
    name: resume-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python resume_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # أدخله يدوياً في لوحة Render
      - key: WEBHOOK_URL
        sync: false          # مثال: https://resume-bot.onrender.com
      - key: PORT
        value: "10000"       # Render يستخدم هذا المنفذ افتراضياً
